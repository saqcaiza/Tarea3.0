
name: Flask app hola

on:
  push:
    branches: [ "main" ]
  

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Contruir la imagen
      run: docker build -t ghcr.io/saqcaiza/holaflask:1.0.0.  

    - name: Login hacia Github container Registry  
      run: echo "${{ secrets.TOKEN_WRT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    
    - name: Publicar la imagen
      run: docker push ghcr.io/saqcaiza/holaflask:1.0.0
      
